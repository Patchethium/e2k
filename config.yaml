tmp_dir: "vendor"
output_dir: "output"
seed: 1969

dataset:
  name: "katakana_dict.jsonl"
  seed: 3407
  num_workers: 4

model:
  dim: 256
  n_heads: 2
  n_enc_layers: 2
  n_dec_layers: 2
  max_len: 32
  causal: true
  backbone: "rnn"

train:
  batch_size: 64
  epochs: 50
  lr: 1.0e-3
  mask_ratio: 0.3
  gamma: 0.95